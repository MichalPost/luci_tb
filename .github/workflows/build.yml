name: Build IPK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_cortex-a53
            sdk_url: https://downloads.openwrt.org/releases/24.10.1/targets/mediatek/filogic/openwrt-sdk-24.10.1-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 缓存 SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-${{ matrix.arch }}-24.10.1

      - name: 下载并解压 SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "${{ matrix.sdk_url }}" -O sdk.tar.zst
          mkdir sdk
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: 配置 feeds
        run: |
          cd sdk
          cat > feeds.conf << 'EOF'
          src-git packages https://github.com/openwrt/packages.git^d8cd30f4e281d6853b3de134c4f147a807583e43
          src-git luci https://github.com/openwrt/luci.git^2ac26e56cc55102cb10e7b0867c2b78e0f6d5fd8
          src-git routing https://github.com/openwrt/routing.git^c9b636698881059a3c981032770968f5a98ff201
          src-cpy tieba-sign ${{ github.workspace }}
          EOF
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p tieba-sign

      - name: 编译
        run: |
          cd sdk
          make defconfig
          make package/tieba-sign/compile -j$(nproc) V=s
          make package/luci-app-tieba-sign/compile -j$(nproc) V=s

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.arch }}
          path: sdk/bin/packages/${{ matrix.arch }}/tieba-sign/*.ipk

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有编译产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release 并上传 IPK
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
