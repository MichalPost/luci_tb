name: Build IPK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_cortex-a53
            target: mediatek/filogic

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 使用 OpenWrt SDK 编译
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: ${{ matrix.arch }}-24.10.1
          FEEDNAME: tieba-sign
          PACKAGES: tieba-sign luci-app-tieba-sign
          NO_SHFMT_CHECK: 1

      - name: 上传编译产物
        uses: actions/upload-artifact@v5
        with:
          name: ipk-${{ matrix.arch }}
          path: bin/packages/${{ matrix.arch }}/tieba-sign/*.ipk

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有编译产物
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: 创建 Release 并上传 IPK
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
